name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Сайт живёт в подпапке /pavel-psychologist/ на GitHub Pages,
      # поэтому сборка идёт с basePath (логика — в next.config.mjs).
      # Для переезда на свой домен достаточно убрать env-переменную.
      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /pavel-psychologist

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
